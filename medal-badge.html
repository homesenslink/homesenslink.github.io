<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Medal Badge</title>
  <style>
    body { margin: 0; padding: 20px; background: transparent; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { position: relative; width: 280px; height: 320px; }
    svg { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="container">
    <svg viewBox="0 0 280 320" xmlns="http://www.w3.org/2000/svg" style="background: transparent;">
      <!-- 왼쪽 리본 -->
      <path d="M 85 0 L 105 5 Q 108 30 105 60 L 90 70 Q 92 35 95 8 Z" fill="#D41E3A"/>
      <path d="M 105 5 Q 115 8 120 35 Q 120 50 110 65 L 105 60 Q 108 30 105 5 Z" fill="#B81D2E"/>
      
      <!-- 오른쪽 리본 -->
      <path d="M 175 0 L 195 5 Q 203 35 200 70 L 190 65 Q 192 30 185 8 Z" fill="#D41E3A"/>
      <path d="M 175 0 L 165 8 Q 160 35 170 65 L 180 60 Q 172 30 175 5 Z" fill="#B81D2E"/>
      
      <!-- 메달 그림자 -->
      <ellipse cx="140" cy="165" rx="68" ry="12" fill="#000000" opacity="0.15"/>
      
      <!-- 메달 외부 테두리 (어두운 금색) -->
      <circle cx="140" cy="140" r="66" fill="#B8960F"/>
      
      <!-- 메달 주요 부분 (밝은 금색) -->
      <circle cx="140" cy="140" r="62" fill="#FFD700"/>
      
      <!-- 메달 중앙 원 (더 밝은 금색) -->
      <circle cx="140" cy="140" r="58" fill="#FFED4E"/>
      
      <!-- 메달 테두리 장식 (나뭇잎 패턴) -->
      <g fill="#D4AF37" opacity="0.8">
        <!-- 왼쪽 나뭇잎 -->
        <ellipse cx="100" cy="120" rx="6" ry="10" fill="#D4AF37" opacity="0.7" transform="rotate(-30 100 120)"/>
        <ellipse cx="98" cy="135" rx="5" ry="8" fill="#D4AF37" opacity="0.6" transform="rotate(-20 98 135)"/>
        <ellipse cx="102" cy="150" rx="5" ry="8" fill="#D4AF37" opacity="0.6" transform="rotate(20 102 150)"/>
        <ellipse cx="100" cy="160" rx="6" ry="10" fill="#D4AF37" opacity="0.7" transform="rotate(30 100 160)"/>
        
        <!-- 오른쪽 나뭇잎 -->
        <ellipse cx="180" cy="120" rx="6" ry="10" fill="#D4AF37" opacity="0.7" transform="rotate(30 180 120)"/>
        <ellipse cx="182" cy="135" rx="5" ry="8" fill="#D4AF37" opacity="0.6" transform="rotate(20 182 135)"/>
        <ellipse cx="178" cy="150" rx="5" ry="8" fill="#D4AF37" opacity="0.6" transform="rotate(-20 178 150)"/>
        <ellipse cx="180" cy="160" rx="6" ry="10" fill="#D4AF37" opacity="0.7" transform="rotate(-30 180 160)"/>
      </g>
      
      <!-- 번호 "1" -->
      <text x="140" y="155" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#D4AF37" text-anchor="middle" letter-spacing="-2">1</text>
      
      <!-- 메달 하이라이트 -->
      <ellipse cx="120" cy="120" rx="15" ry="12" fill="#FFFFFF" opacity="0.4"/>
    </svg>
  </div>
</body>
</html>
